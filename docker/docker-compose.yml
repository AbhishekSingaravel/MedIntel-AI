services:

  postgres:

    image: pgvector/pgvector:pg16

    container_name: medintel-postgres

    restart: unless-stopped

    ports:
      - "5433:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: medintel_ai

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:

  postgres_data: